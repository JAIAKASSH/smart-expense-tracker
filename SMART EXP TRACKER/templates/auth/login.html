{% extends 'base.html' %}
{% block auth_content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo"><i class="bi bi-wallet2"></i></div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your SpendSmart account</p>

    {% if form.errors %}
      <div class="alert alert-danger custom-alert mb-3" role="alert">
        <i class="bi bi-exclamation-circle-fill me-2"></i>Invalid username or password.
      </div>
    {% endif %}

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text" style="background:var(--bg);border:1.5px solid var(--border);border-right:none;border-radius:10px 0 0 10px;">
            <i class="bi bi-person" style="color:var(--text-muted)"></i>
          </span>
          {{ form.username }}
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text" style="background:var(--bg);border:1.5px solid var(--border);border-right:none;border-radius:10px 0 0 10px;">
            <i class="bi bi-lock" style="color:var(--text-muted)"></i>
          </span>
          {{ form.password }}
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2" style="font-size:15px;">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <p class="text-center mt-4 mb-0" style="font-size:14px;color:var(--text-muted);">
      Don't have an account? <a href="{% url 'signup' %}" class="auth-link">Create one</a>
    </p>
  </div>
</div>

<style>
  .auth-wrapper .input-group .form-control {
    border-left: none;
    border-radius: 0 10px 10px 0;
    background: var(--bg);
  }
  .auth-wrapper .input-group .form-control:focus {
    border-color: var(--primary);
    box-shadow: none;
    background: white;
  }
</style>
{% endblock %}
