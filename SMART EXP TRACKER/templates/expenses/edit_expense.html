{% extends 'base.html' %}
{% block page_title %}Edit Expense{% endblock %}
{% block content %}

<div class="page-header">
  <h2>Edit Expense</h2>
  <p>Update the details of your transaction</p>
</div>

<div class="form-card">
  <form method="post" novalidate>
    {% csrf_token %}

    <div class="mb-3">
      <label class="form-label"><i class="bi bi-card-text me-1" style="color:var(--primary)"></i>Description</label>
      {{ form.description }}
    </div>

    <div class="row g-3 mb-3">
      <div class="col-sm-6">
        <label class="form-label"><i class="bi bi-currency-rupee me-1" style="color:var(--success)"></i>Amount</label>
        {{ form.amount }}
      </div>
      <div class="col-sm-6">
        <label class="form-label"><i class="bi bi-calendar3 me-1" style="color:var(--warning)"></i>Date</label>
        {{ form.date }}
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label"><i class="bi bi-tag-fill me-1" style="color:var(--secondary)"></i>Category</label>
      {{ form.category }}
    </div>

    <div class="mb-4">
      <label class="form-label"><i class="bi bi-sticky-fill me-1" style="color:var(--info)"></i>Notes <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
      {{ form.notes }}
    </div>

    <div class="d-flex gap-3">
      <button type="submit" class="btn btn-primary flex-fill">
        <i class="bi bi-check-circle-fill me-2"></i>Save Changes
      </button>
      <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
